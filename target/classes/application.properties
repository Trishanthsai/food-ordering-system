# ============================================
# Application Configuration
# ============================================
spring.application.name=foodorder-backend
server.port=8080

# ============================================
# PostgreSQL Database Configuration
# ============================================
spring.datasource.url=jdbc:postgresql://localhost:5432/Food_order_db
spring.datasource.username=postgres
spring.datasource.password=1234
spring.datasource.driver-class-name=org.postgresql.Driver

# ============================================
# JPA / Hibernate Configuration
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# JWT Configuration
# ============================================
app.jwt.secret=foodorder_jwt_secret_key_must_be_at_least_256_bits_long_for_hs256
app.jwt.expiration=86400000

# ============================================
# CORS Configuration
# ============================================
app.cors.allowed-origins=http://localhost:3000

# ============================================
# Razorpay (Test Mode - Dummy Keys)
# ============================================
razorpay.key.id=rzp_test_dummyKeyId
razorpay.key.secret=dummySecretKey
